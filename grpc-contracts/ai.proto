syntax = "proto3";

package ai;

service AIService {
    rpc GenerateReport(GenerateReportRequest) returns (GenerateReportResponse);
    rpc FetchMarketData(FetchMarketDataRequest) returns (FetchMarketDataResponse);
    rpc FetchNews(FetchNewsRequest) returns (FetchNewsResponse);
    rpc RunDisruptionAgent(RunDisruptionAgentRequest) returns (RunDisruptionAgentResponse);
    rpc GetCorridorRiskScores(GetCorridorRiskScoresRequest) returns (GetCorridorRiskScoresResponse);
    rpc GetCommodityRiskScores(GetCommodityRiskScoresRequest) returns (GetCommodityRiskScoresResponse);
    rpc RunSupplyChainEconomiesAgent(RunSupplyChainEconomiesAgentRequest) returns (RunSupplyChainEconomiesAgentResponse);
    rpc GetHighRiskEvents(GetHighRiskEventsRequest) returns (GetHighRiskEventsResponse);
}

message GenerateReportRequest {}
message GenerateReportResponse {
    string data_json = 1;
}

message FetchMarketDataRequest {}
message FetchMarketDataResponse {
    string data_json = 1;
}

message FetchNewsRequest {}
message FetchNewsResponse {
    string data_json = 1;
}

message RunDisruptionAgentRequest {}
message RunDisruptionAgentResponse {
    string data_json = 1;
}

message GetCorridorRiskScoresRequest {}
message GetCorridorRiskScoresResponse {
    string data_json = 1;
}

message GetCommodityRiskScoresRequest {}
message GetCommodityRiskScoresResponse {
    string data_json = 1;
}

message RunSupplyChainEconomiesAgentRequest {}
message RunSupplyChainEconomiesAgentResponse {
    string data_json = 1;
}

message GetHighRiskEventsRequest {}
message GetHighRiskEventsResponse {
    string data_json = 1;
}